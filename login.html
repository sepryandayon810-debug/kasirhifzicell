<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebPOS - Login</title>
    <link rel="stylesheet" href="./css/main.css">
    <link rel="stylesheet" href="./css/login.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
</head>
<body>
    <div class="login-container">
        <div class="login-box">
            <div class="logo-section">
                <img src="./assets/images/logo.png" alt="Logo" id="login-logo" onerror="this.style.display='none'">
                <h1>WebPOS</h1>
                <p>Sistem Point of Sale</p>
            </div>
            
            <form id="login-form">
                <div class="input-group">
                    <label for="email">Email</label>
                    <div class="input-icon">
                        <i class="fas fa-envelope"></i>
                        <input type="email" id="email" placeholder="Masukkan email" required>
                    </div>
                </div>
                
                <div class="input-group">
                    <label for="password">Password</label>
                    <div class="input-icon">
                        <i class="fas fa-lock"></i>
                        <input type="password" id="password" placeholder="Masukkan password" required>
                        <button type="button" class="toggle-password" onclick="togglePassword()">
                            <i class="fas fa-eye"></i>
                        </button>
                    </div>
                </div>
                
                <div class="remember-me">
                    <label>
                        <input type="checkbox" id="remember"> Ingat saya
                    </label>
                </div>
                
                <button type="submit" class="btn-login" id="btn-login">
                    <i class="fas fa-sign-in-alt"></i> Masuk
                </button>
                
                <div id="error-message" class="error-message"></div>
            </form>
            
            <div class="login-footer">
                <p id="date-info"></p>
            </div>
        </div>
    </div>

    <!-- ✅ PATH YANG BENAR - Sesuai struktur repo Anda -->
    <script src="./js/firebase-config.js"></script>
    <script src="./js/utils.js"></script>
    <script src="./js/auth.js"></script>
    
    <script>
        // Toggle password visibility
        function togglePassword() {
            const passwordInput = document.getElementById('password');
            const toggleBtn = document.querySelector('.toggle-password i');
            
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                toggleBtn.classList.remove('fa-eye');
                toggleBtn.classList.add('fa-eye-slash');
            } else {
                passwordInput.type = 'password';
                toggleBtn.classList.remove('fa-eye-slash');
                toggleBtn.classList.add('fa-eye');
            }
        }

        // Update date
        document.getElementById('date-info').textContent = new Date().toLocaleDateString('id-ID', {
            weekday: 'long', year: 'numeric', month: 'long', day: 'numeric'
        });

        // Login form handler
        document.getElementById('login-form').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const btnLogin = document.getElementById('btn-login');
            const errorMsg = document.getElementById('error-message');
            
            btnLogin.disabled = true;
            btnLogin.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Loading...';
            errorMsg.textContent = '';
            
            try {
                const userCredential = await auth.signInWithEmailAndPassword(email, password);
                const user = userCredential.user;
                
                // Get user data from database
                const snapshot = await database.ref('users/' + user.uid).once('value');
                const userData = snapshot.val();
                
                if (userData && userData.active === false) {
                    await auth.signOut();
                    errorMsg.textContent = 'Akun Anda dinonaktifkan!';
                    btnLogin.disabled = false;
                    btnLogin.innerHTML = '<i class="fas fa-sign-in-alt"></i> Masuk';
                    return;
                }
                
                // Update last login
                await database.ref('users/' + user.uid).update({
                    last_login: firebase.database.ServerValue.TIMESTAMP
                });
                
                // Save to session
                sessionStorage.setItem('user_uid', user.uid);
                sessionStorage.setItem('user_email', user.email);
                sessionStorage.setItem('user_role', userData?.role || 'kasir');
                sessionStorage.setItem('user_nama', userData?.nama || user.email);
                
                // Redirect to dashboard
                window.location.href = './dashboard.html';
                
            } catch (error) {
                console.error('Login error:', error);
                let message = 'Login gagal!';
                switch(error.code) {
                    case 'auth/user-not-found': message = 'Email tidak terdaftar!'; break;
                    case 'auth/wrong-password': message = 'Password salah!'; break;
                    case 'auth/invalid-email': message = 'Format email tidak valid!'; break;
                    case 'auth/too-many-requests': message = 'Terlalu banyak percobaan, coba lagi nanti!'; break;
                    default: message = error.message;
                }
                errorMsg.textContent = message;
                btnLogin.disabled = false;
                btnLogin.innerHTML = '<i class="fas fa-sign-in-alt"></i> Masuk';
            }
        });
    </script>
</body>
</html>
