<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebPOS - Login</title>
    <link rel="stylesheet" href="./css/main.css">
    <link rel="stylesheet" href="./css/login.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
</head>
<body>
    <div class="login-container">
        <div class="login-box">
            <div class="logo-section">
                <img src="./assets/images/logo.png" alt="Logo" id="login-logo" onerror="this.style.display='none'">
                <h1>WebPOS</h1>
                <p>Sistem Point of Sale</p>
            </div>
            
            <form id="login-form">
                <div class="input-group">
                    <label>Email</label>
                    <div class="input-icon">
                        <i class="fas fa-envelope"></i>
                        <input type="email" id="email" placeholder="admin@toko.com" required>
                    </div>
                </div>
                
                <div class="input-group">
                    <label>Password</label>
                    <div class="input-icon">
                        <i class="fas fa-lock"></i>
                        <input type="password" id="password" placeholder="admin123" required>
                        <button type="button" class="toggle-password" onclick="togglePassword()">
                            <i class="fas fa-eye"></i>
                        </button>
                    </div>
                </div>
                
                <button type="submit" class="btn-login" id="btn-login">
                    <i class="fas fa-sign-in-alt"></i> Masuk
                </button>
                
                <div id="error-message" style="color: red; margin-top: 10px; text-align: center;"></div>
            </form>
            
            <!-- TOMBOL BUAT AKUN ADMIN -->
            <div style="margin-top: 20px; text-align: center; border-top: 1px solid #333; padding-top: 20px;">
                <p style="color: #666; font-size: 12px; margin-bottom: 10px;">Belum punya akun?</p>
                <button onclick="buatAkun()" style="padding: 12px 20px; background: #10b981; color: white; border: none; border-radius: 8px; cursor: pointer;">
                    <i class="fas fa-user-plus"></i> Buat Akun Admin
                </button>
            </div>
        </div>
    </div>

    <!-- ✅ CONFIG INLINE - Tidak pakai file external -->
    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyD9XyvgofyFyX5aUMARcA_GO-N2Tcw725Q",
            authDomain: "goodhifzicell.firebaseapp.com",
            databaseURL: "https://goodhifzicell-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "goodhifzicell",
            storageBucket: "goodhifzicell.firebasestorage.app",
            messagingSenderId: "306835710868",
            appId: "1:306835710868:web:817551e6c8c19c8eca6581"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const database = firebase.database();
    </script>
    
    <script>
        function togglePassword() {
            const input = document.getElementById('password');
            input.type = input.type === 'password' ? 'text' : 'password';
        }

        document.getElementById('login-form').addEventListener('submit', async function(e) {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const btnLogin = document.getElementById('btn-login');
            
            btnLogin.disabled = true;
            btnLogin.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Loading...';
            
            try {
                await auth.signInWithEmailAndPassword(email, password);
                window.location.href = './dashboard.html';
            } catch (error) {
                document.getElementById('error-message').textContent = error.message;
                btnLogin.disabled = false;
                btnLogin.innerHTML = '<i class="fas fa-sign-in-alt"></i> Masuk';
            }
        });

        function buatAkun() {
            const email = "admin@toko.com";
            const password = "admin123";
            
            auth.createUserWithEmailAndPassword(email, password)
                .then(function(userCredential) {
                    const user = userCredential.user;
                    return database.ref("users/" + user.uid).set({
                        nama: "Admin",
                        email: email,
                        role: "owner",
                        active: true,
                        created_at: Date.now()
                    });
                })
                .then(function() {
                    alert("✅ Akun admin berhasil dibuat!\n\nEmail: admin@toko.com\nPassword: admin123\n\nSilakan login.");
                })
                .catch(function(error) {
                    if (error.code === "auth/email-already-in-use") {
                        alert("⚠️ Akun sudah ada!\n\nSilakan login dengan:\nEmail: admin@toko.com\nPassword: admin123");
                    } else {
                        alert("❌ Error: " + error.message);
                    }
                });
        }
    </script>
</body>
</html>
