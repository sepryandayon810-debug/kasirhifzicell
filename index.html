<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebPOS - Point of Sale</title>
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/darkmode.css">
    <link rel="stylesheet" href="css/responsive.css">
    <link rel="stylesheet" href="modules/sidebar/sidebar.css">
    <link rel="stylesheet" href="modules/header/header.css">
</head>
<body>
    <!-- Login Screen -->
    <div id="login-screen" class="login-screen">
        <div class="login-container">
            <div class="login-logo">
                <img src="assets/images/logo.png" alt="WebPOS" id="login-logo-img">
                <h2>WebPOS</h2>
            </div>
            <form id="login-form">
                <div class="form-group">
                    <label>Username</label>
                    <input type="text" id="username" required placeholder="Masukkan username">
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="password" required placeholder="Masukkan password">
                </div>
                <div class="form-group">
                    <label>Role</label>
                    <select id="role-select" required>
                        <option value="">Pilih Role</option>
                        <option value="owner">Owner</option>
                        <option value="admin">Admin</option>
                        <option value="kasir">Kasir</option>
                    </select>
                </div>
                <button type="submit" class="btn-login">Login</button>
            </form>
            <div id="login-error" class="error-message"></div>
        </div>
    </div>

    <!-- Main App -->
    <div id="main-app" class="main-app hidden">
        <!-- Header -->
        <div id="header-container"></div>
        
        <!-- Sidebar -->
        <div id="sidebar-container"></div>
        
        <!-- Content Area -->
        <main id="content-area" class="content-area">
            <div id="module-content"></div>
        </main>
    </div>

    <!-- Scripts -->
    <script src="js/storage.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/auth.js"></script>
    <script src="modules/sidebar/sidebar.js"></script>
    <script src="modules/header/header.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
