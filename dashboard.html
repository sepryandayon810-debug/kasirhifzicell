<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebPOS - Dashboard</title>
    <link rel="stylesheet" href="./css/main.css">
    <link rel="stylesheet" href="./css/dashboard.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
</head>
<body>
    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <h3>WebPOS</h3>
        </div>
        <nav class="sidebar-nav">
            <ul>
                <li><a href="./dashboard.html" class="active"><i class="fas fa-home"></i> Dashboard</a></li>
                <li><a href="./pages/kasir.html"><i class="fas fa-cash-register"></i> Kasir</a></li>
                <li><a href="./pages/produk.html"><i class="fas fa-box"></i> Produk</a></li>
                <li><a href="./pages/riwayat-transaksi.html"><i class="fas fa-history"></i> Riwayat</a></li>
                <li><a href="./pages/laporan.html"><i class="fas fa-chart-bar"></i> Laporan</a></li>
            </ul>
        </nav>
        <div class="sidebar-footer">
            <button onclick="logout()"><i class="fas fa-sign-out-alt"></i> Logout</button>
        </div>
    </aside>

    <!-- Main Content -->
    <main class="main-content">
        <header class="main-header">
            <h2>Dashboard</h2>
            <div class="user-info">
                <span id="user-name">Loading...</span>
                <button onclick="logout()">Logout</button>
            </div>
        </header>

        <div class="content-area">
            <h3>Selamat Datang di WebPOS!</h3>
            <p>Dashboard utama sistem point of sale.</p>
        </div>
    </main>

    <!-- Firebase Config Inline -->
    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyD9XyvgofyFyX5aUMARcA_GO-N2Tcw725Q",
            authDomain: "goodhifzicell.firebaseapp.com",
            databaseURL: "https://goodhifzicell-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "goodhifzicell",
            storageBucket: "goodhifzicell.firebasestorage.app",
            messagingSenderId: "306835710868",
            appId: "1:306835710868:web:817551e6c8c19c8eca6581"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const database = firebase.database();
        
        // ✅ CEK SESSION - Hanya sekali saat load
        let checked = false;
        auth.onAuthStateChanged(function(user) {
            if (checked) return; // Hindari loop
            checked = true;
            
            if (!user) {
                // Belum login, redirect ke login
                window.location.replace('./login.html');
            } else {
                // Sudah login, tampilkan nama user
                document.getElementById('user-name').textContent = user.email;
            }
        });

        function logout() {
            auth.signOut().then(function() {
                window.location.replace('./login.html');
            });
        }
    </script>
</body>
</html>
